<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>LISP Library</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header>
        <h1>LISP Library</h1>
        <div class="controls">
            <button id="guideBtn">アップロード手順</button>
            <input id="search" placeholder="検索...（キーボードの [ / ] でここに移動）">
            <button id="sortToggle" class="btn-secondary">名前順 ↑</button>
　　　　</div>
　　　<div id="secret-content" class="hidden">
  　　<h2>アーカイブ</h2>
 　　 <p>限定閲覧</p>
　　　</div>

    </header>

    <div id="tagCloud" class="tag-cloud"></div>

    <section class="info-section">
        <div class="info-card">
            <p><strong>【注意事項】</strong>不測の事態に備え、作業データのバックアップをお願いします。</p>
            <p class="info-update"><strong>【検索のコツ】</strong>「/」キーで検索窓へ。「ESC」でリセット。画像はクリックで拡大できます。</p>
        </div>
    </section>

    <!-- 閲覧履歴 -->
    <section id="recentSection" class="hidden">
        <div class="section-header">
            <h2>閲覧履歴</h2>
            <button id="clearRecentBtn" class="btn-clear">閲覧履歴クリア</button>
        </div>
        <div id="recentGrid" class="grid-mini"></div>
    </section>

    <!-- メイングリッド -->
    <main id="grid" class="main-grid"></main>

    <!-- 詳細モーダル -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <button class="close">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- 手順ガイドモーダル -->
    <div id="guideModal" class="modal hidden">
        <div class="modal-content">
            <button class="close guide-close">&times;</button>
            <h2>BricsCAD LISP追加手順</h2>
            <div class="guide-body">
                <h3>1. コマンド「APPLOAD」を入力</h3>
                <h3>2. 右上『+』ボタンからLISPを選択</h3>
                <h3>3. 『ロード』『自動ロード』にチェック</h3>
            </div>
        </div>
    </div>

    <!-- 画像拡大ビューアー -->
    <div id="imgViewer" class="imgViewer hidden"></div>

    <script src="script.js"></script>
</body>
</html>
