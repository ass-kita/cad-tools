<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAD LISP ASSET</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1a1a1a; }
        .glass { background: rgba(38, 38, 38, 0.8); backdrop-filter: blur(12px); }
        /* スクロールバーのデザイン */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="text-gray-100 min-h-screen pb-20">

    <header class="p-10 max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <div class="text-white text-5xl font-black tracking-tighter mb-2">
                    CAD LISP <span class="text-green-500">.</span>
                </div>
                <p class="text-gray-500 font-medium italic">Efficiency for CAD Professionals</p>
            </div>
            <div class="relative w-full md:w-80">
                <input type="text" id="searchInput" oninput="renderTools(this.value)" 
                    placeholder="ツール名やタグで検索..." 
                    class="w-full bg-[#262626] border border-gray-800 rounded-2xl py-4 px-6 focus:outline-none focus:border-green-500 transition-all text-white shadow-2xl">
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-10">
        <div id="toolGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
        <div id="noResults" class="hidden text-center py-20 text-gray-500 text-xl">
            一致するツールが見つかりませんでした。
        </div>
    </main>

    <div id="modal" onclick="closeModalOutside(event)" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden flex items-center justify-center z-50 p-4 transition-all duration-300">
        <div id="modalContainer" class="bg-[#262626] border border-gray-800 rounded-[2.5rem] max-w-2xl w-full p-10 shadow-2xl relative scale-95 opacity-0 transition-all duration-300">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-500 hover:text-white text-3xl">✕</button>
            <div id="modal-content">
                </div>
        </div>
    </div>

    <script>
        // --- 1. ツールデータ管理エリア ---
        // ここを書き換えるだけでサイトが更新されます
        const tools = [
            { 
                name: "BLCHNG", 
                category: "一括画層変換", 
                desc: "ブロックの中身をByLayerに一括変更します。", 
                color: "border-green-500", 
                text: "text-green-500", 
                hover: "group-hover:text-green-500",
                cmd: "BLCHNG",
                info: "選択したブロック内のオブジェクトをすべて画層0、色はByLayerに変更します。画層管理をスッキリさせるための必須LISPです。",
                tags: ["AutoCAD", "Layer"] 
            },
            { 
                name: "KE", 
                category: "レイアウト作成", 
                desc: "標準図枠を全レイアウトへ一括配置します。", 
                color: "border-blue-500", 
                text: "text-blue-500", 
                hover: "group-hover:text-blue-500",
                cmd: "KE",
                info: "図面内のすべてのレイアウトタブに対して、社内標準の図枠を一括挿入します。手作業のミスをゼロにします。",
                tags: ["Layout", "Frame"] 
            },
            { 
                name: "ET", 
                category: "印刷設定", 
                desc: "複数シートを一括でPDF出力設定に更新します。", 
                color: "border-orange-500", 
                text: "text-orange-500", 
                hover: "group-hover:text-orange-500",
                cmd: "ET",
                info: "全レイアウトのプリンタ設定、用紙サイズ、印刷スタイルを一瞬でPDF用に書き換えます。",
                tags: ["Print", "PDF"] 
            }
        ];

        // --- 2. カードを表示するプログラム ---
        function renderTools(filter = '') {
            const toolGrid = document.getElementById('toolGrid');
            const noResults = document.getElementById('noResults');
            const query = filter.toLowerCase();

            const filtered = tools.filter(t => 
                t.name.toLowerCase().includes(query) || 
                t.category.includes(query) || 
                t.tags.some(tag => tag.toLowerCase().includes(query))
            );

            toolGrid.innerHTML = '';
            if (filtered.length === 0) {
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                filtered.forEach(tool => {
                    const card = `
                        <div onclick="openModal('${tool.name}')" class="group cursor-pointer bg-[#262626] rounded-[2rem] border-l-[8px] ${tool.color} p-8 hover:bg-[#2d2d2d] hover:-translate-y-2 transition-all duration-300 shadow-xl border border-gray-800/50">
                            <div class="${tool.text} text-[10px] font-bold uppercase tracking-[0.2em] mb-3">${tool.category}</div>
                            <h2 class="text-3xl font-black text-white mb-4 ${tool.hover} transition-colors">${tool.name}</h2>
                            <p class="text-gray-400 text-sm leading-relaxed mb-6">${tool.desc}</p>
                            <div class="flex flex-wrap gap-2 mt-auto">
                                ${tool.tags.map(tag => `<span class="text-[9px] text-gray-500 border border-gray-800 px-2 py-1 rounded-md uppercase tracking-widest font-bold">#${tag}</span>`).join('')}
                            </div>
                        </div>
                    `;
                    toolGrid.innerHTML += card;
                });
            }
        }

        // --- 3. ポップアップ（モーダル）の制御 ---
        function openModal(name) {
            const tool = tools.find(t => t.name === name);
            const modal = document.getElementById('modal');
            const container = document.getElementById('modalContainer');
            const content = document.getElementById('modal-content');
            
            content.innerHTML = `
                <div class="${tool.text} text-xs font-bold uppercase tracking-widest mb-2">${tool.category}</div>
                <h2 class="text-5xl font-black text-white mb-8 tracking-tighter">${tool.name}</h2>
                
                <div class="space-y-8">
                    <div>
                        <h3 class="text-gray-500 text-[10px] uppercase font-bold tracking-widest mb-3">起動コマンド</h3>
                        <div class="bg-black/40 p-5 rounded-2xl text-green-400 font-mono text-2xl border border-gray-800/50 shadow-inner">
                            <span class="text-gray-700">COMMAND:</span> ${tool.cmd}
                        </div>
                    </div>
                    
                    <div>
                        <h3 class="text-gray-500 text-[10px] uppercase font-bold tracking-widest mb-3">詳細・手順</h3>
                        <p class="text-gray-300 leading-relaxed text-lg font-medium">${tool.info}</p>
                    </div>

                    <div class="pt-10 border-t border-gray-800/50 flex flex-col sm:flex-row gap-4">
                        <a href="#" class="flex-1 bg-white text-black font-black py-5 rounded-2xl text-center hover:bg-gray-200 transition-all shadow-lg active:scale-95">
                            DOWNLOAD .LSP
                        </a>
                        <button onclick="copyCommand('${tool.cmd}')" class="flex-1 bg-[#333] text-white font-black py-5 rounded-2xl hover:bg-[#444] transition-all active:scale-95 border border-gray-700">
                            コマンドをコピー
                        </button>
                    </div>
                </div>
            `;
            
            modal.classList.remove('hidden');
            // アニメーション用に少し遅らせて表示
            setTimeout(() => {
                container.classList.remove('scale-95', 'opacity-0');
            }, 10);
        }

        function closeModal() {
            const container = document.getElementById('modalContainer');
            container.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                document.getElementById('modal').classList.add('hidden');
            }, 200);
        }

        function closeModalOutside(e) {
            if (e.target.id === 'modal') closeModal();
        }

        function copyCommand(text) {
            navigator.clipboard.writeText(text);
            alert("コマンド [" + text + "] をコピーしました！\nCADのコマンドラインで Ctrl+V してください。");
        }

        // ページ読み込み時に実行
        renderTools();
    </script>
</body>
</html>
